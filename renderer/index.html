<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano MIDI Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-tab="piano">

  <header id="header">
    <h1 id="app-title">Piano</h1>
    <div id="status-area">
      <span id="status-dot" class="dot disconnected"></span>
      <span id="status-label">No MIDI device</span>
    </div>
    <div id="note-display">
      <span id="note-name">--</span>
      <span id="velocity-label">vel: --</span>
      <span id="freq-label"></span>
    </div>
    <div id="sustain-indicator">
      <span class="sustain-dot"></span>
      SUS
    </div>
  </header>

  <nav id="tab-bar">
    <button class="tab active" data-tab="piano">Piano</button>
    <button class="tab" data-tab="scale">Scale</button>
    <button class="tab" data-tab="random">Random</button>
    <button class="tab" data-tab="tails">Tails</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>

  <div id="tab-strip"></div>

  <!-- Hidden control fragments — moved into #tab-strip on tab activation -->
  <div id="tab-fragments" hidden>
    <div class="key-dropdown" data-keyselect-host>
      <select id="key-select" title="Key signature">
        <option value="random">Random</option>
        <option value="C">C major</option>
        <option value="G">G major</option>
        <option value="D">D major</option>
        <option value="A">A major</option>
        <option value="E">E major</option>
        <option value="B">B major</option>
        <option value="F#">F# major</option>
        <option value="F">F major</option>
        <option value="Bb">Bb major</option>
        <option value="Eb">Eb major</option>
        <option value="Ab">Ab major</option>
        <option value="Db">Db major</option>
      </select>
    </div>

    <div data-tab-controls="scale">
      <label for="key-select" title="Key signature">Key</label>
      <span data-keyselect-slot></span>
      <button id="scale-btn" title="Show the full scale for the selected key">Scale</button>
      <label class="config-label" title="In scale mode, wrong notes flash all keys red and restart the scale">
        <input type="checkbox" id="cfg-scale-strict" />
        <span class="toggle-track"></span>
        Strict
      </label>
    </div>

    <div data-tab-controls="random">
      <label for="key-select" title="Key signature">Key</label>
      <span data-keyselect-slot></span>
      <label for="count-select" title="Number of notes to generate">Notes</label>
      <select id="count-select" title="Number of notes to generate">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
      <label for="pattern-select" title="Musical pattern type for generated notes">Pattern</label>
      <select id="pattern-select" title="Musical pattern type for generated notes">
        <option value="any">Any</option>
        <option value="random">Random Notes</option>
        <option value="triad">Triad</option>
        <option value="scalefragment">Scale Fragment</option>
        <option value="arpeggio">Arpeggio</option>
        <option value="interval">Interval</option>
        <option value="shell">Shell Voicing</option>
        <option value="pentatonic">Pentatonic</option>
      </select>
      <button id="generate-btn" title="Generate a new set of notes to practice">Generate</button>
      <label class="config-label" title="Generate notes for both treble and bass clef">
        <input type="checkbox" id="cfg-two-handed" />
        <span class="toggle-track"></span>
        2H
      </label>
      <label class="config-label edge-bias-label" title="0 = uniform · positive = favor edge keys · negative = favor center keys">
        <span>Edge</span>
        <input type="range" id="cfg-edge-bias" min="-2" max="3" step="0.5" value="0" />
        <span id="cfg-edge-bias-val">0.0</span>
      </label>
    </div>
  </div>

  <section id="staff-section">
    <button id="staff-align-btn" title="Cycle staff alignment"></button>
    <span id="feedback-label"></span>
    <svg id="staff-svg" viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg"></svg>
  </section>

  <section id="tab-main-tails" class="tab-main" hidden>
    <canvas id="tails-canvas"></canvas>
  </section>

  <section id="tab-main-settings" class="tab-main" hidden>
    <div class="tab-main-inner">
      <h2>Settings</h2>
      <div class="settings-row">
        <label class="config-label" title="Show note frequency in Hz on key press">
          <input type="checkbox" id="cfg-frequency" />
          <span class="toggle-track"></span>
          Show frequency (Hz)
        </label>
      </div>
      <div class="settings-row">
        <label class="config-label" title="Highlight target keys on the piano keyboard">
          <input type="checkbox" id="cfg-shadow-key" />
          <span class="toggle-track"></span>
          Shadow off-key
        </label>
      </div>
      <div class="settings-row">
        <label class="config-label" title="Highlight the root note of the selected key">
          <input type="checkbox" id="cfg-root-key" />
          <span class="toggle-track"></span>
          Show root key
        </label>
      </div>
      <div class="settings-row">
        <label class="config-label" title="33% of generated patterns will display as half notes">
          <input type="checkbox" id="cfg-half-notes" />
          <span class="toggle-track"></span>
          Use half notes
        </label>
      </div>
    </div>
  </section>

  <main id="piano-container">
    <div id="piano-wrapper">
      <div id="piano"></div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
